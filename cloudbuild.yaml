steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/cc2026azai/repo-lab/app:latest', '.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/cc2026azai/repo-lab/app:latest']

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - run
    - deploy
    - app-service
    - --image=us-central1-docker.pkg.dev/cc2026azai/repo-lab/app:latest
    - --region=us-central1
    - --platform=managed
    - --allow-unauthenticated

images:
- 'us-central1-docker.pkg.dev/cc2026azai/repo-lab/app:latest'
